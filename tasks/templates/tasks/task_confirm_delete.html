{% extends 'tasks/base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title text-danger mb-3">Delete Task</h2>
                <p class="card-text">Are you sure you want to delete "{{ task.title }}"?</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
